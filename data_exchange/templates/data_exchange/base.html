{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'data_exchange/css/style.css' %}">
    <title>{{ title }}</title>
</head>
<body>
    {% block mainmenu %}
    <div class="main-menu">
        <h1>{{title}}</h1>
    </div>
    {% endblock %}
    <div class="body-content">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
    
</body>
<script src="{% static 'data_exchange/js/scripts.js' %}"></script>
</html>
